<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>360° Panorama Viewer</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="viewer"></div>

  <div id="ui">
    <div class="title">360° Panorama Viewer</div>
    <div class="hint">ドラッグで視点移動 / ホイールでズーム / スマホVRゴーグル対応</div>

    <label class="upload">
      パノラマ画像を開く
      <input id="fileInput" type="file" accept="image/*" />
    </label>

    <div class="motion-panel">
      <button id="motionBtn" type="button" aria-pressed="false">モーション開始</button>
      <button id="vrBtn" type="button" aria-pressed="false">VRゴーグル</button>
      <div id="motionStatus" class="motion-status" aria-live="polite" hidden></div>
    </div>

    <button id="resetBtn">視点をリセット</button>
    <button id="fullscreenBtn">全画面</button>
  </div>

  <div id="vrHud" hidden>
    <div class="vr-status">
      <div id="vrMessage" class="vr-message" aria-live="polite">横向きにしてゴーグルへ</div>
      <button id="exitVrBtn" type="button">VR終了</button>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
